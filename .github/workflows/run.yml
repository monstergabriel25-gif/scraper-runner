name: Run Scrappers

on:
  repository_dispatch:
    types: [run_scrappers]

jobs:
  run:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        file: [scrapper10.js, scrapper11.js, scrapper12.js, scrapper13.js, scrapper14.js, scrapper15.js, scrapper16.js, scrapper17.js, scrapper18.js]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run Scraper
        run: node ${{ matrix.file }}
